---
name: support-triage
version: "1.0.0"
description: >
  Customer support ticket triage environment. An AI agent reads incoming
  support tickets, classifies their category and urgency, assigns to the
  correct team, and optionally drafts a reply. Mirrors real SaaS ops workflows.
author: openenv-support-triage
tags:
  - openenv
  - customer-support
  - nlp
  - triage
  - real-world

observation_space:
  type: object
  properties:
    ticket_id:
      type: string
    subject:
      type: string
    body:
      type: string
    sender_email:
      type: string
    created_at:
      type: string
    attachments:
      type: array
      items:
        type: string
    history:
      type: array
      items:
        type: object
    step_number:
      type: integer
    task_id:
      type: string
    tickets_remaining:
      type: integer
    tickets_completed:
      type: integer

action_space:
  type: object
  properties:
    category:
      type: string
      enum: [billing, technical, account, feature_request, abuse, general]
    urgency:
      type: string
      enum: [critical, high, medium, low]
    assign_to:
      type: string
      enum: [billing_team, technical_team, account_team, trust_safety, product_team, general_support]
    draft_reply:
      type: string
      nullable: true
    needs_escalation:
      type: boolean
    tags:
      type: array
      items:
        type: string
  required:
    - category
    - urgency
    - assign_to

reward_space:
  type: object
  properties:
    total:
      type: number
      minimum: 0.0
      maximum: 1.0
    category_score:
      type: number
      minimum: 0.0
      maximum: 1.0
    urgency_score:
      type: number
      minimum: 0.0
      maximum: 1.0
    routing_score:
      type: number
      minimum: 0.0
      maximum: 1.0
    escalation_score:
      type: number
      minimum: 0.0
      maximum: 1.0
    reply_score:
      type: number
      minimum: 0.0
      maximum: 1.0
    feedback:
      type: string

tasks:
  - id: task_easy
    name: "Basic Ticket Classification"
    difficulty: easy
    description: >
      Classify 5 straightforward tickets into correct categories and urgency levels.
      Tickets have clear, unambiguous signals.
    max_steps: 10
    passing_score: 0.7

  - id: task_medium
    name: "Triage with Partial Information"
    difficulty: medium
    description: >
      Handle 5 tickets with ambiguous signals. Agent must infer context from
      limited information and correctly route to specialized teams.
    max_steps: 15
    passing_score: 0.6

  - id: task_hard
    name: "Crisis Triage with Reply Drafting"
    difficulty: hard
    description: >
      Handle 5 complex tickets including abuse reports, multi-issue tickets,
      and angry customers. Must triage correctly AND draft appropriate replies.
    max_steps: 20
    passing_score: 0.5

endpoints:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
  health: "GET /health"

runtime:
  python: "3.11"
  framework: fastapi
  port: 7860
