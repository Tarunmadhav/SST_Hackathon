version = 1
requires-python = ">=3.11"

[[package]]
name = "support-triage-openenv"
version = "1.0.0"
source = { editable = "." }
dependencies = [
  { name = "fastapi" },
  { name = "uvicorn", extra = ["standard"] },
  { name = "pydantic" },
  { name = "openai" },
  { name = "requests" },
  { name = "python-multipart" },
  { name = "openenv-core" },
]

[package.metadata]
requires-dist = [
  { name = "fastapi", specifier = "==0.115.5" },
  { name = "uvicorn", extras = ["standard"], specifier = "==0.32.1" },
  { name = "pydantic", specifier = "==2.9.2" },
  { name = "openai", specifier = "==1.54.4" },
  { name = "requests", specifier = "==2.32.3" },
  { name = "python-multipart", specifier = "==0.0.17" },
  { name = "openenv-core", specifier = ">=0.2.0" },
]

[[package]]
name = "fastapi"
version = "0.115.5"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "uvicorn"
version = "0.32.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.9.2"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openai"
version = "1.54.4"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "requests"
version = "2.32.3"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "python-multipart"
version = "0.0.17"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openenv-core"
version = "0.2.0"
source = { registry = "https://pypi.org/simple" }
